apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmp-cm-ksops
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: ksops
    spec:
      version: v1.0
      discover:
        find:
          command:
            - sh
            - -c
            - find . -name ksops-generator.yaml | grep -q .
      generate:
        command:
          - sh
          - -c
          - kustomize build --enable-alpha-plugins --enable-exec .
