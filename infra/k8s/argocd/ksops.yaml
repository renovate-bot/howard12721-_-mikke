apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmp-cm-ksops
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: ksops
    spec:
      version: v1.0
      discover:
        find:
          command:
            - sh
            - -c
            - find . -name ksops-generator.yaml | grep -q .
      generate:
        command:
          - sh
          - -c
          - kustomize build --enable-alpha-plugins --enable-exec .
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      volumes:
        - name: custom-tools
          emptyDir: {}
        - name: cmp-plugin-ksops
          configMap:
            name: argocd-cmp-cm-ksops
        - name: cmp-tmp
          emptyDir: {}
        - name: sops-age
          secret:
            secretName: argocd-sops-age
            optional: true
      initContainers:
        - name: install-ksops
          image: viaductoss/ksops:v4.5.1
          command:
            - /usr/local/bin/ksops
            - install
            - --with-kustomize
            - /custom-tools
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
      containers:
        - name: argocd-repo-server
          volumeMounts:
            - mountPath: /usr/local/bin/kustomize
              name: custom-tools
              subPath: kustomize
            - mountPath: /usr/local/bin/ksops
              name: custom-tools
              subPath: ksops
        - name: ksops
          image: quay.io/argoproj/argocd:v3.2.4
          command:
            - /var/run/argocd/argocd-cmp-server
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          env:
            - name: XDG_CONFIG_HOME
              value: /home/argocd/.config
            - name: SOPS_AGE_KEY_FILE
              value: /home/argocd/.config/sops/age/keys.txt
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml
              name: cmp-plugin-ksops
            - mountPath: /tmp
              name: cmp-tmp
            - mountPath: /usr/local/bin/kustomize
              name: custom-tools
              subPath: kustomize
            - mountPath: /usr/local/bin/ksops
              name: custom-tools
              subPath: ksops
            - mountPath: /home/argocd/.config/sops/age
              name: sops-age
              readOnly: true
