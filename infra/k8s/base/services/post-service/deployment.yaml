---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: post-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: post-service
    spec:
      initContainers:
      - name: migrate-db
        image: ghcr.io/howard12721/mikke-migrations
        env:
        - name: MIGRATION_SERVICE
          value: post-service
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
      containers:
      - name: post-service
        image: ghcr.io/howard12721/mikke-post-service
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50053
          name: grpc
        env:
        - name: POST_SERVICE_PORT
          value: '50053'
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_DATABASE
          value: post_service
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        readinessProbe:
          grpc:
            port: 50053
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50053
          initialDelaySeconds: 30
          periodSeconds: 20
