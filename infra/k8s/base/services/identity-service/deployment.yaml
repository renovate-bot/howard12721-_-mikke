---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
    spec:
      initContainers:
      - name: wait-for-mariadb
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - until nc -z mariadb 3306; do sleep 2; done
      - name: wait-for-redis
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - until nc -z redis 6379; do sleep 2; done
      - name: migrate-db
        image: ghcr.io/howard12721/mikke-migrations:sha-0dd6c41463979d5694b4ab9cbc2f8fa04d02648b
        env:
        - name: MIGRATION_SERVICE
          value: identity-service
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
      containers:
      - name: identity-service
        image: ghcr.io/howard12721/mikke-identity-service:sha-0dd6c41463979d5694b4ab9cbc2f8fa04d02648b
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: IDENTITY_SERVICE_PORT
          value: '50051'
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_DATABASE
          value: identity_service
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        - name: IDENTITY_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: identity-auth
              key: jwt-secret
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 30
          periodSeconds: 20
