---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: feed-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feed-service
    spec:
      initContainers:
      - name: wait-for-mariadb
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - until nc -z mariadb 3306; do sleep 2; done
      - name: wait-for-redis
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - until nc -z redis 6379; do sleep 2; done
      - name: migrate-db
        image: flyway/flyway:12.4.0
        args:
        - migrate
        env:
        - name: FLYWAY_URL
          value: jdbc:mariadb://mariadb:3306/feed_service
        - name: FLYWAY_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: FLYWAY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
        - name: FLYWAY_LOCATIONS
          value: filesystem:/flyway/sql
        volumeMounts:
        - name: migration
          mountPath: "/flyway/sql"
      containers:
      - name: feed-service
        image: ghcr.io/howard12721/mikke-feed-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50056
          name: grpc
        env:
        - name: FEED_SERVICE_PORT
          value: '50056'
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_DATABASE
          value: feed_service
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        readinessProbe:
          grpc:
            port: 50056
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50056
          initialDelaySeconds: 30
          periodSeconds: 20
      volumes:
      - name: migration
        configMap:
          name: feed-service-migration
