---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: friendship-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: friendship-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: friendship-service
    spec:
      initContainers:
      - name: wait-for-mariadb
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - until nc -z mariadb 3306; do sleep 2; done
      - name: wait-for-redis
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - until nc -z redis 6379; do sleep 2; done
      - name: migrate-db
        image: ghcr.io/howard12721/mikke-migrations:sha-9122e0e6f398546ec07d133fa50b632433c9d577
        env:
        - name: MIGRATION_SERVICE
          value: friendship-service
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
      containers:
      - name: friendship-service
        image: ghcr.io/howard12721/mikke-friendship-service:sha-9122e0e6f398546ec07d133fa50b632433c9d577
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50052
          name: grpc
        env:
        - name: FRIENDSHIP_SERVICE_PORT
          value: '50052'
        - name: MARIADB_HOST
          value: mariadb
        - name: MARIADB_PORT
          value: '3306'
        - name: MARIADB_DATABASE
          value: friendship_service
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: username
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-auth
              key: password
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        readinessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 30
          periodSeconds: 20
