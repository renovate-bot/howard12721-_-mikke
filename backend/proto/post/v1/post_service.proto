syntax = "proto3";

package mikke.post.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "jp.xhw.mikke.post.v1";

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
  rpc BatchGetPosts(BatchGetPostsRequest) returns (BatchGetPostsResponse);
  rpc ListUserPosts(ListUserPostsRequest) returns (ListUserPostsResponse);
  rpc ListMyPosts(ListMyPostsRequest) returns (ListMyPostsResponse);
  rpc ListPostsForFeedBackfill(ListPostsForFeedBackfillRequest) returns (ListPostsForFeedBackfillResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  rpc UpdatePostCaption(UpdatePostCaptionRequest) returns (UpdatePostCaptionResponse);
  rpc UpdatePostVisibility(UpdatePostVisibilityRequest) returns (UpdatePostVisibilityResponse);
  rpc CheckPostVisibility(CheckPostVisibilityRequest) returns (CheckPostVisibilityResponse);
  rpc CheckPostVisibilityForViewer(CheckPostVisibilityForViewerRequest) returns (CheckPostVisibilityForViewerResponse);
  rpc GetPostLocationForGuess(GetPostLocationForGuessRequest) returns (GetPostLocationForGuessResponse);
}

message CreatePostRequest {
  string media_id = 1;
  string caption = 2;
  PostVisibility visibility = 3;
  mikke.common.v1.GeoPoint location = 4;
  double accuracy_meters = 5;
}

message CreatePostResponse {
  Post post = 1;
}

message GetPostRequest {
  string post_id = 1;
}

message GetPostResponse {
  reserved 2;

  Post post = 1;
}

message BatchGetPostsRequest {
  repeated string post_ids = 1;
}

message BatchGetPostsResponse {
  repeated Post posts = 1;
}

message ListUserPostsRequest {
  string user_id = 1;
  mikke.common.v1.PageRequest page = 2;
}

message ListUserPostsResponse {
  repeated Post posts = 1;
  mikke.common.v1.PageInfo page_info = 2;
}

message ListMyPostsRequest {
  mikke.common.v1.PageRequest page = 1;
}

message ListMyPostsResponse {
  repeated Post posts = 1;
  mikke.common.v1.PageInfo page_info = 2;
}

message ListPostsForFeedBackfillRequest {
  string viewer_user_id = 1;
  string author_user_id = 2;
  mikke.common.v1.PageRequest page = 3;
}

message ListPostsForFeedBackfillResponse {
  repeated Post posts = 1;
  mikke.common.v1.PageInfo page_info = 2;
}

message DeletePostRequest {
  string post_id = 1;
}

message DeletePostResponse {}

message UpdatePostCaptionRequest {
  string post_id = 1;
  string caption = 2;
}

message UpdatePostCaptionResponse {
  Post post = 1;
}

message UpdatePostVisibilityRequest {
  string post_id = 1;
  PostVisibility visibility = 2;
}

message UpdatePostVisibilityResponse {
  Post post = 1;
}

message CheckPostVisibilityRequest {
  string post_id = 1;
}

message CheckPostVisibilityResponse {
  bool can_view = 1;
  Post post = 2;
}

message CheckPostVisibilityForViewerRequest {
  string post_id = 1;
  string viewer_user_id = 2;
}

message CheckPostVisibilityForViewerResponse {
  bool can_view = 1;
  Post post = 2;
}

message GetPostLocationForGuessRequest {
  string post_id = 1;
}

message GetPostLocationForGuessResponse {
  string post_id = 1;
  string author_user_id = 2;
  mikke.common.v1.GeoPoint location = 3;
}

message Post {
  string id = 1;
  string author_user_id = 2;
  string media_id = 3;
  string caption = 4;
  PostVisibility visibility = 5;
  PostStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message PostLocation {
  string post_id = 1;
  mikke.common.v1.GeoPoint point = 2;
  double accuracy_meters = 3;
  google.protobuf.Timestamp created_at = 4;
}

enum PostVisibility {
  POST_VISIBILITY_UNSPECIFIED = 0;
  POST_VISIBILITY_FRIENDS = 1;
  POST_VISIBILITY_PRIVATE = 2;
}

enum PostStatus {
  POST_STATUS_UNSPECIFIED = 0;
  POST_STATUS_ACTIVE = 1;
  POST_STATUS_DELETED = 2;
  POST_STATUS_PENDING_MEDIA_ATTACH = 3;
}
