syntax = "proto3";

package mikke.common.v1;

option java_multiple_files = true;
option java_package = "jp.xhw.mikke.common.v1";

message GeoPoint {
  double latitude = 1;
  double longitude = 2;
}

message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PageInfo {
  string next_page_token = 1;
  bool has_next_page = 2;
}
