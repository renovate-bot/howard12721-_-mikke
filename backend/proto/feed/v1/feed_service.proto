syntax = "proto3";

package mikke.feed.v1;

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "jp.xhw.mikke.feed.v1";

service FeedService {
  rpc ListTimelineItems(ListTimelineItemsRequest) returns (ListTimelineItemsResponse);
  rpc BackfillFriendshipFeed(BackfillFriendshipFeedRequest) returns (BackfillFriendshipFeedResponse);
  rpc HideFeedItem(HideFeedItemRequest) returns (HideFeedItemResponse);
  rpc UnhideFeedItem(UnhideFeedItemRequest) returns (UnhideFeedItemResponse);
  rpc MarkFeedItemRead(MarkFeedItemReadRequest) returns (MarkFeedItemReadResponse);
  rpc MarkTimelineRead(MarkTimelineReadRequest) returns (MarkTimelineReadResponse);
  rpc GetUnreadFeedCount(GetUnreadFeedCountRequest) returns (GetUnreadFeedCountResponse);
}

message ListTimelineItemsRequest {
  mikke.common.v1.PageRequest page = 1;
}

message ListTimelineItemsResponse {
  repeated FeedItem items = 1;
  mikke.common.v1.PageInfo page_info = 2;
}

message BackfillFriendshipFeedRequest {
  string friendship_id = 1;
  string user_a_id = 2;
  string user_b_id = 3;
}

message BackfillFriendshipFeedResponse {
  int64 created_item_count = 1;
}

message HideFeedItemRequest {
  string feed_item_id = 1;
}

message HideFeedItemResponse {
  FeedItem item = 1;
}

message UnhideFeedItemRequest {
  string feed_item_id = 1;
}

message UnhideFeedItemResponse {
  FeedItem item = 1;
}

message MarkFeedItemReadRequest {
  string feed_item_id = 1;
}

message MarkFeedItemReadResponse {
  FeedItem item = 1;
}

message MarkTimelineReadRequest {
  google.protobuf.Timestamp read_until = 1;
}

message MarkTimelineReadResponse {}

message GetUnreadFeedCountRequest {}

message GetUnreadFeedCountResponse {
  int64 unread_count = 1;
}

message FeedItem {
  string id = 1;
  string viewer_user_id = 2;
  string post_id = 3;
  string author_user_id = 4;
  FeedItemType item_type = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp read_at = 7;
  google.protobuf.Timestamp hidden_at = 8;
}

enum FeedItemType {
  FEED_ITEM_TYPE_UNSPECIFIED = 0;
  FEED_ITEM_TYPE_POST_CREATED = 1;
}
