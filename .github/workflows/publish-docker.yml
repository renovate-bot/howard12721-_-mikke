name: Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/publish-docker.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: backend/api/Dockerfile
          - service: identity-service
            dockerfile: backend/services/identity-service/Dockerfile
          - service: post-service
            dockerfile: backend/services/post-service/Dockerfile
          - service: friendship-service
            dockerfile: backend/services/friendship-service/Dockerfile
          - service: feed-service
            dockerfile: backend/services/feed-service/Dockerfile
          - service: media-service
            dockerfile: backend/services/media-service/Dockerfile
          - service: notification-service
            dockerfile: backend/services/notification-service/Dockerfile
          - service: guess-service
            dockerfile: backend/services/guess-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/mikke-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
