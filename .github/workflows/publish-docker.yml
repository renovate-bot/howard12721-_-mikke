name: Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/publish-docker.yml'
  workflow_dispatch:

concurrency:
  group: publish-docker-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: backend/api/Dockerfile
          - service: identity-service
            dockerfile: backend/services/identity-service/Dockerfile
          - service: post-service
            dockerfile: backend/services/post-service/Dockerfile
          - service: friendship-service
            dockerfile: backend/services/friendship-service/Dockerfile
          - service: feed-service
            dockerfile: backend/services/feed-service/Dockerfile
          - service: media-service
            dockerfile: backend/services/media-service/Dockerfile
          - service: notification-service
            dockerfile: backend/services/notification-service/Dockerfile
          - service: guess-service
            dockerfile: backend/services/guess-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/mikke-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/mikke-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-kustomize-tags:
    name: Update Kustomize Image Tags
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Update image tags in overlay
        run: |
          sed -Ei "s/^([[:space:]]*newTag:[[:space:]]*).*/\1${IMAGE_TAG}/" infra/k8s/overlays/home/kustomization.yaml

      - name: Commit updated image tags
        run: |
          if git diff --quiet -- infra/k8s/overlays/home/kustomization.yaml; then
            echo "Overlay image tags already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/home/kustomization.yaml
          git commit -m "chore(k8s): deploy ${IMAGE_TAG}"
          git push origin HEAD:${GITHUB_REF_NAME}
