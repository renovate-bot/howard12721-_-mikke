name: CI Infra

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/ci-infra.yml"
      - ".github/workflows/publish-docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/ci-infra.yml"
      - ".github/workflows/publish-docker.yml"

jobs:
  compose:
    name: Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate local debug compose
        run: docker compose -f infra/docker/compose.dev.yml config > /tmp/mikke-compose.yaml

  docker-build:
    name: Docker Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: backend
            dockerfile: backend/api/Dockerfile
          - service: migrations
            context: infra/k8s
            dockerfile: infra/k8s/images/migrations/Dockerfile
          - service: identity-service
            context: backend
            dockerfile: backend/services/identity-service/Dockerfile
          - service: post-service
            context: backend
            dockerfile: backend/services/post-service/Dockerfile
          - service: friendship-service
            context: backend
            dockerfile: backend/services/friendship-service/Dockerfile
          - service: feed-service
            context: backend
            dockerfile: backend/services/feed-service/Dockerfile
          - service: media-service
            context: backend
            dockerfile: backend/services/media-service/Dockerfile
          - service: notification-service
            context: backend
            dockerfile: backend/services/notification-service/Dockerfile
          - service: guess-service
            context: backend
            dockerfile: backend/services/guess-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: mikke/${{ matrix.service }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.service }}

  kustomize:
    name: Kustomize Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Render home overlay
        run: kubectl kustomize infra/k8s/overlays/home > /tmp/mikke-home-overlay.yaml
